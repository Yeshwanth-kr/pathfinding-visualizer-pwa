name: Quality Gate

on:
  pull_request:
    branches: [main]

jobs:
  validate-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install & Lint
        run: |
          npm install
          npm run lint

      - name: Build Docker Image
        run: docker build -t visualizer:test .

      - name: Run Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "visualizer:test"
          format: "table"
          exit-code: "1" # This WILL fail the PR if Critical vulnerabilities are found
          severity: "CRITICAL,HIGH"

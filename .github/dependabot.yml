version: 2
updates:
  # 1. Track npm dependencies (Vite, ESLint, PWA tools)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly" # Weekly is better to avoid "Update Fatigue"
    open-pull-requests-limit: 5
    # This ensures Dependabot uses your .npmrc settings
    versioning-strategy: increase

  # 2. Track Docker base images (Node and Nginx)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly" # Docker images don't change as fast as npm
    open-pull-requests-limit: 2

  # 3. Track GitHub Actions (treosh/lighthouse, amondnet/vercel, etc.)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
